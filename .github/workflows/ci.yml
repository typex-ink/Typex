name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rustfmt:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: rustfmt
        run: cargo fmt --check --manifest-path src-tauri/Cargo.toml

  clippy:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

  cargo-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

  frontend-build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Generate IPC bindings
        run: pnpm gen:ipc

      - name: vue-tsc + vite build
        run: pnpm build

      - name: HUD chunk size assertion under 150 KB gzip (docs 07 section 11)
        run: |
          HUD_JS=$(ls dist/assets/hud-*.js | head -1)
          SIZE=$(gzip -c "$HUD_JS" | wc -c)
          echo "hud chunk gzip = $SIZE bytes"
          test "$SIZE" -lt 153600

  frontend-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Generate IPC bindings
        run: pnpm gen:ipc

      - name: vitest
        run: pnpm test
