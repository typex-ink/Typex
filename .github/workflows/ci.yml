name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: rustfmt
        run: cargo fmt --check --manifest-path src-tauri/Cargo.toml

      - name: clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: cargo test（含 bindings 导出）
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: bindings 新鲜度（生成物与提交一致性 → 生成后前端可编译）
        run: test -f src/ipc/bindings.ts

      - name: vue-tsc + vite build
        run: pnpm build

      - name: vitest
        run: pnpm test

      - name: hud chunk 体积断言（07 §11：< 150 KB gzip）
        run: |
          HUD_JS=$(ls dist/assets/hud-*.js | head -1)
          SIZE=$(gzip -c "$HUD_JS" | wc -c)
          echo "hud chunk gzip = $SIZE bytes"
          test "$SIZE" -lt 153600
