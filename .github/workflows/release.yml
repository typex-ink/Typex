name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release version
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Validate tag and version fields
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must be vMAJOR.MINOR.PATCH, got: $TAG"
            exit 1
          fi

          VERSION="${TAG#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAURI_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          CARGO_VERSION="$(awk -F ' = ' '/^version = / { gsub(/"/, "", $2); print $2; exit }' src-tauri/Cargo.toml)"

          if [[ "$VERSION" == *-dev ]]; then
            echo "Formal release version must not include -dev: $VERSION"
            exit 1
          fi

          for item in \
            "package.json:$PACKAGE_VERSION" \
            "src-tauri/tauri.conf.json:$TAURI_VERSION" \
            "src-tauri/Cargo.toml:$CARGO_VERSION"
          do
            file="${item%%:*}"
            value="${item#*:}"
            if [[ "$value" != "$VERSION" ]]; then
              echo "$file version ($value) does not match tag version ($VERSION)"
              exit 1
            fi
          done

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  # Each platform job uploads a release-assets-<platform> artifact. publish
  # aggregates updater fragments and release metadata without rebuilding them.
  build-macos:
    name: Build macOS universal
    needs: validate
    runs-on: macos-14
    env:
      PLATFORM_ID: macos-universal
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (2026-06-30)
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Generate IPC bindings
        run: pnpm gen:ipc

      - name: Build macOS app
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          BUILD_CONFIG="$(node <<'NODE'
          const config = { bundle: { createUpdaterArtifacts: false } };
          if (process.env.TAURI_UPDATER_PUBKEY) {
            config.plugins = { updater: { pubkey: process.env.TAURI_UPDATER_PUBKEY.trim() } };
          }
          process.stdout.write(JSON.stringify(config));
          NODE
          )"
          pnpm tauri build \
            --target universal-apple-darwin \
            --bundles app \
            --no-sign \
            --ci \
            --config "$BUILD_CONFIG"

      - name: Bundle local runtime dylibs
        run: scripts/bundle-macos-runtime-dylibs.sh

      - name: Prepare macOS release assets
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          export BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          export ASSET_DIR="release-assets/${PLATFORM_ID}"
          export DMG_NAME="typex-${PLATFORM_ID}-${VERSION}.dmg"
          export RELEASE_TAG="${GITHUB_REF_NAME}"
          export UPDATER_VERSION="${VERSION}"
          export UPDATER_ARCHIVE_NAME="typex-${PLATFORM_ID}-${VERSION}.app.tar.gz"
          export UPDATE_NOTES="Typex ${GITHUB_REF_NAME}
          Commit: ${GITHUB_SHA}"
          scripts/prepare-macos-assets.sh

      - name: Upload macOS release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-assets-${{ env.PLATFORM_ID }}
          path: release-assets/${{ env.PLATFORM_ID }}/*
          if-no-files-found: error

  build-windows:
    name: Build Windows x86_64 NSIS
    needs: validate
    runs-on: windows-latest
    env:
      PLATFORM_ID: windows-x86_64
      CARGO_TARGET_DIR: C:\t
      CMAKE_GENERATOR: Ninja
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (2026-06-30)
        with:
          targets: x86_64-pc-windows-msvc

      - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@30ba978f977e81b72d091fc8888feb1fb26f9aff # v1.2
        with:
          version: 1.3.296.0
          cache: true

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            src-tauri -> C:\t

      - name: Verify native build tools
        shell: pwsh
        run: |
          ninja --version
          if ([string]::IsNullOrWhiteSpace($env:VULKAN_SDK)) {
            throw "VULKAN_SDK was not configured"
          }
          & (Join-Path $env:VULKAN_SDK "Bin\glslc.exe") --version
          $sevenZip = Join-Path $env:ProgramFiles "7-Zip\7z.exe"
          if (-not (Test-Path -LiteralPath $sevenZip -PathType Leaf)) {
            throw "Full 7-Zip is required for NSIS payload verification"
          }
          $sevenZipInfo = & $sevenZip i
          if ($LASTEXITCODE -ne 0 -or -not ($sevenZipInfo | Select-String -SimpleMatch "Nsis")) {
            throw "7-Zip does not support NSIS extraction"
          }
          $sevenZipInfo | Select-String -Pattern "7-Zip|Nsis"

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Generate IPC bindings
        run: pnpm gen:ipc

      - name: Build Tauri-signed updater and unsigned NSIS installer
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          foreach ($name in @(
            "TAURI_SIGNING_PRIVATE_KEY",
            "TAURI_UPDATER_PUBKEY"
          )) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              throw "$name is required"
            }
          }

          $config = @{
            bundle = @{ createUpdaterArtifacts = $true }
            plugins = @{ updater = @{ pubkey = $env:TAURI_UPDATER_PUBKEY.Trim() } }
          } | ConvertTo-Json -Depth 8 -Compress
          $configPath = Join-Path $env:RUNNER_TEMP "tauri-release.json"
          [IO.File]::WriteAllText($configPath, $config, [Text.UTF8Encoding]::new($false))

          pnpm tauri build --bundles nsis --ci --config $configPath
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify Windows installer and updater signature
        shell: pwsh
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: ./scripts/verify-windows-bundle.ps1 -RequireInstallerExtraction -RequireUpdaterSignature

      - name: Prepare Windows release assets
        shell: pwsh
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          REQUIRE_AUTHENTICODE: "false"
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          $env:BUILD_TIME = [DateTime]::UtcNow.ToString("yyyy-MM-ddTHH:mm:ssZ")
          $env:ASSET_DIR = "release-assets/$($env:PLATFORM_ID)"
          $env:INSTALLER_NAME = "typex-$($env:PLATFORM_ID)-$($env:VERSION)-unsigned-setup.exe"
          $env:RELEASE_TAG = $env:GITHUB_REF_NAME
          $env:UPDATER_VERSION = $env:VERSION
          $env:UPDATE_NOTES = "Typex $env:GITHUB_REF_NAME`nCommit: $env:GITHUB_SHA"
          ./scripts/prepare-windows-assets.ps1

      - name: Upload Windows release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-assets-${{ env.PLATFORM_ID }}
          path: release-assets/${{ env.PLATFORM_ID }}/*
          if-no-files-found: error

  publish:
    name: Publish draft release
    needs:
      - validate
      - build-macos
      - build-windows
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download platform release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: release-assets-*
          path: release-artifacts

      - name: Collect release assets without name collisions
        run: |
          mkdir release-assets
          found=0
          while IFS= read -r -d '' file; do
            found=1
            name="$(basename "$file")"
            if [[ -e "release-assets/$name" ]]; then
              echo "Duplicate release asset name across platform artifacts: $name"
              exit 1
            fi
            cp "$file" "release-assets/$name"
          done < <(find release-artifacts -type f -print0 | sort -z)
          if [[ "$found" -ne 1 ]]; then
            echo "No platform release assets were downloaded"
            exit 1
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (2026-06-30)

      - name: Aggregate updater manifests
        env:
          EXPECTED_RELEASE_TAG: ${{ github.ref_name }}
          EXPECTED_CHANNEL: stable
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          node scripts/aggregate-updater-manifests.mjs release-assets
          find release-assets -maxdepth 1 -type f -name 'updater-*.json' -delete

      - name: Prepare aggregate release metadata
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          export BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          cd release-assets
          : > SHA256SUMS.txt
          while IFS= read -r -d '' file; do
            sha256sum "$file" >> SHA256SUMS.txt
          done < <(find . -maxdepth 1 -type f ! -name '*.json' ! -name 'SHA256SUMS.txt' -print0 | sort -z)
          cd ..

          node <<'NODE'
          const fs = require("fs");
          const dir = "release-assets";
          const files = fs.readdirSync(dir).filter((file) => fs.statSync(`${dir}/${file}`).isFile());
          const platformFiles = files
            .filter((file) => /^platform-[a-z0-9_-]+\.json$/.test(file))
            .sort();
          const platformAssets = platformFiles.map((file) => JSON.parse(fs.readFileSync(`${dir}/${file}`, "utf8")));
          const assetFiles = files
            .filter((file) => !platformFiles.includes(file) && file !== "release.json")
            .sort();
          const metadata = {
            tag: process.env.GITHUB_REF_NAME,
            version: process.env.VERSION,
            commit: process.env.GITHUB_SHA,
            workflow_run: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            built_at: process.env.BUILD_TIME,
            platforms: platformAssets.map((item) => item.platform),
            assets: [...assetFiles, ...platformFiles, "release.json"],
            platform_assets: platformAssets,
          };
          fs.writeFileSync(`${dir}/release.json`, `${JSON.stringify(metadata, null, 2)}\n`);
          NODE

          PLATFORMS="$(node -e "const fs = require('fs'); const m = JSON.parse(fs.readFileSync('release-assets/release.json', 'utf8')); console.log(m.platforms.join(', '));")"
          cat > release-notes.md <<EOF
          Typex ${GITHUB_REF_NAME}

          - Commit: \`${GITHUB_SHA}\`
          - Built at: \`${BUILD_TIME}\`
          - Platforms: ${PLATFORMS}
          EOF

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if RELEASE_STATE="$(gh release view "$GITHUB_REF_NAME" --json isDraft,isImmutable --jq '[.isDraft, .isImmutable] | @tsv' 2>/dev/null)"; then
            IFS=$'\t' read -r IS_DRAFT IS_IMMUTABLE <<< "$RELEASE_STATE"
            if [[ "$IS_DRAFT" != "true" ]]; then
              echo "Release $GITHUB_REF_NAME is already published; refusing to change it back to draft."
              exit 1
            fi
            if [[ "$IS_IMMUTABLE" == "true" ]]; then
              echo "Release $GITHUB_REF_NAME is immutable; refusing to edit its assets."
              exit 1
            fi

            gh release edit "$GITHUB_REF_NAME" \
              --title "Typex $GITHUB_REF_NAME" \
              --notes-file release-notes.md \
              --draft=true \
              --prerelease=false
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "Typex $GITHUB_REF_NAME" \
              --draft \
              --verify-tag \
              --notes-file release-notes.md
          fi

          gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber
