name: Nightly

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Each platform job uploads a nightly-assets-<platform> artifact. publish
  # aggregates updater fragments and nightly metadata without rebuilding them.
  build-macos:
    name: Build macOS universal
    runs-on: macos-14
    env:
      PLATFORM_ID: macos-universal
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (2026-06-30)
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Generate IPC bindings
        run: pnpm gen:ipc

      - name: Build macOS app
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          BUILD_CONFIG="$(node <<'NODE'
          const config = { bundle: { createUpdaterArtifacts: false } };
          if (process.env.TAURI_UPDATER_PUBKEY) {
            config.plugins = { updater: { pubkey: process.env.TAURI_UPDATER_PUBKEY.trim() } };
          }
          process.stdout.write(JSON.stringify(config));
          NODE
          )"
          pnpm tauri build \
            --target universal-apple-darwin \
            --bundles app \
            --no-sign \
            --ci \
            --config "$BUILD_CONFIG"

      - name: Bundle local runtime dylibs
        run: scripts/bundle-macos-runtime-dylibs.sh

      - name: Prepare macOS nightly assets
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          export BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          VERSION="$(node -p "require('./package.json').version")"
          export ASSET_DIR="nightly-assets/${PLATFORM_ID}"
          export DMG_NAME="typex-${PLATFORM_ID}-nightly.dmg"
          export RELEASE_TAG="nightly"
          export UPDATER_VERSION="${VERSION}"
          export UPDATER_ARCHIVE_NAME="typex-${PLATFORM_ID}-nightly.app.tar.gz"
          export UPDATE_NOTES="Nightly ${GITHUB_SHA}"
          scripts/prepare-macos-assets.sh

      - name: Upload macOS nightly assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nightly-assets-${{ env.PLATFORM_ID }}
          path: nightly-assets/${{ env.PLATFORM_ID }}/*
          if-no-files-found: error

  build-windows:
    name: Build Windows x86_64 NSIS
    runs-on: windows-latest
    env:
      PLATFORM_ID: windows-x86_64
      CARGO_TARGET_DIR: C:\t
      CMAKE_GENERATOR: Ninja
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (2026-06-30)
        with:
          targets: x86_64-pc-windows-msvc

      - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@30ba978f977e81b72d091fc8888feb1fb26f9aff # v1.2
        with:
          version: 1.3.296.0
          cache: true

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            src-tauri -> C:\t

      - name: Verify native build tools
        shell: pwsh
        run: |
          ninja --version
          if ([string]::IsNullOrWhiteSpace($env:VULKAN_SDK)) {
            throw "VULKAN_SDK was not configured"
          }
          & (Join-Path $env:VULKAN_SDK "Bin\glslc.exe") --version
          $sevenZip = Join-Path $env:ProgramFiles "7-Zip\7z.exe"
          if (-not (Test-Path -LiteralPath $sevenZip -PathType Leaf)) {
            throw "Full 7-Zip is required for NSIS payload verification"
          }
          $sevenZipInfo = & $sevenZip i
          if ($LASTEXITCODE -ne 0 -or -not ($sevenZipInfo | Select-String -SimpleMatch "Nsis")) {
            throw "7-Zip does not support NSIS extraction"
          }
          $sevenZipInfo | Select-String -Pattern "7-Zip|Nsis"

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Generate IPC bindings
        run: pnpm gen:ipc

      - name: Build Tauri-signed updater and unsigned NSIS installer
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          foreach ($name in @(
            "TAURI_SIGNING_PRIVATE_KEY",
            "TAURI_UPDATER_PUBKEY"
          )) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              throw "$name is required"
            }
          }

          $config = @{
            bundle = @{ createUpdaterArtifacts = $true }
            plugins = @{ updater = @{ pubkey = $env:TAURI_UPDATER_PUBKEY.Trim() } }
          } | ConvertTo-Json -Depth 8 -Compress
          $configPath = Join-Path $env:RUNNER_TEMP "tauri-nightly.json"
          [IO.File]::WriteAllText($configPath, $config, [Text.UTF8Encoding]::new($false))

          pnpm tauri build --no-bundle --ci --config $configPath
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          pnpm tauri bundle --bundles nsis --ci `
            --config src-tauri/tauri.windows.bundle.conf.json `
            --config $configPath
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify Windows installer and updater signature
        shell: pwsh
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: ./scripts/verify-windows-bundle.ps1 -RequireInstallerExtraction -RequireUpdaterSignature

      - name: Prepare Windows nightly assets
        shell: pwsh
        env:
          REQUIRE_AUTHENTICODE: "false"
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          $version = node -p "require('./package.json').version"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $env:BUILD_TIME = [DateTime]::UtcNow.ToString("yyyy-MM-ddTHH:mm:ssZ")
          $env:ASSET_DIR = "nightly-assets/$($env:PLATFORM_ID)"
          $env:INSTALLER_NAME = "typex-$($env:PLATFORM_ID)-nightly-unsigned-setup.exe"
          $env:RELEASE_TAG = "nightly"
          $env:UPDATER_VERSION = $version
          $env:UPDATE_NOTES = "Nightly $env:GITHUB_SHA"
          ./scripts/prepare-windows-assets.ps1

      - name: Upload Windows nightly assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nightly-assets-${{ env.PLATFORM_ID }}
          path: nightly-assets/${{ env.PLATFORM_ID }}/*
          if-no-files-found: error

  publish:
    name: Publish nightly release
    needs:
      - build-macos
      - build-windows
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      # This job force-moves the nightly tag, so checkout must retain its scoped write token.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download platform nightly assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: nightly-assets-*
          path: nightly-artifacts

      - name: Collect nightly assets without name collisions
        run: |
          mkdir nightly-assets
          found=0
          while IFS= read -r -d '' file; do
            found=1
            name="$(basename "$file")"
            if [[ -e "nightly-assets/$name" ]]; then
              echo "Duplicate nightly asset name across platform artifacts: $name"
              exit 1
            fi
            cp "$file" "nightly-assets/$name"
          done < <(find nightly-artifacts -type f -print0 | sort -z)
          if [[ "$found" -ne 1 ]]; then
            echo "No platform nightly assets were downloaded"
            exit 1
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (2026-06-30)

      - name: Aggregate updater manifests
        env:
          EXPECTED_RELEASE_TAG: nightly
          EXPECTED_CHANNEL: nightly
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          node scripts/aggregate-updater-manifests.mjs nightly-assets
          find nightly-assets -maxdepth 1 -type f -name 'updater-*.json' -delete

      - name: Prepare aggregate nightly metadata
        run: |
          export BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          cd nightly-assets
          : > SHA256SUMS.txt
          while IFS= read -r -d '' file; do
            sha256sum "$file" >> SHA256SUMS.txt
          done < <(find . -maxdepth 1 -type f ! -name '*.json' ! -name 'SHA256SUMS.txt' -print0 | sort -z)
          cd ..

          node <<'NODE'
          const fs = require("fs");
          const dir = "nightly-assets";
          const files = fs.readdirSync(dir).filter((file) => fs.statSync(`${dir}/${file}`).isFile());
          const platformFiles = files
            .filter((file) => /^platform-[a-z0-9_-]+\.json$/.test(file))
            .sort();
          const platformAssets = platformFiles.map((file) => JSON.parse(fs.readFileSync(`${dir}/${file}`, "utf8")));
          const assetFiles = files
            .filter((file) => !platformFiles.includes(file) && file !== "nightly.json")
            .sort();
          const metadata = {
            tag: "nightly",
            commit: process.env.GITHUB_SHA,
            branch: process.env.GITHUB_REF_NAME,
            workflow_run: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            built_at: process.env.BUILD_TIME,
            platforms: platformAssets.map((item) => item.platform),
            assets: [...assetFiles, ...platformFiles, "nightly.json"],
            platform_assets: platformAssets,
          };
          fs.writeFileSync(`${dir}/nightly.json`, `${JSON.stringify(metadata, null, 2)}\n`);
          NODE

          PLATFORMS="$(node -e "const fs = require('fs'); const m = JSON.parse(fs.readFileSync('nightly-assets/nightly.json', 'utf8')); console.log(m.platforms.join(', '));")"
          cat > nightly-notes.md <<EOF
          This release is updated automatically on every push to the main development branch.

          - Commit: \`${GITHUB_SHA}\`
          - Branch: \`${GITHUB_REF_NAME}\`
          - Built at: \`${BUILD_TIME}\`
          - Platforms: ${PLATFORMS}
          EOF

      - name: Publish nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f nightly "$GITHUB_SHA"
          git push origin refs/tags/nightly --force

          if gh release view nightly >/dev/null 2>&1; then
            gh release edit nightly \
              --title "Nightly Build" \
              --prerelease \
              --latest=false \
              --notes-file nightly-notes.md
          else
            gh release create nightly \
              --title "Nightly Build" \
              --prerelease \
              --latest=false \
              --verify-tag \
              --notes-file nightly-notes.md
          fi

          RELEASE_ID="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/nightly" --jq '.id')"
          gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
            -F prerelease=true \
            -f make_latest=false

          gh release upload nightly nightly-assets/* --clobber
