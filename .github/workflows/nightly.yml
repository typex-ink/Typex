name: Nightly

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  macos:
    name: macOS universal
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Generate IPC bindings
        run: pnpm gen:ipc

      - name: Build macOS app
        run: >
          pnpm tauri build
          --target universal-apple-darwin
          --bundles app
          --no-sign
          --ci
          --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Bundle local runtime dylibs
        run: |
          APP_PATH="$(find src-tauri/target -path '*/bundle/macos/Typex.app' -type d | sort | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No Typex.app found under src-tauri/target"
            find src-tauri/target -path '*/bundle/*' -type d | sort
            exit 1
          fi

          FRAMEWORKS_DIR="$APP_PATH/Contents/Frameworks"
          mkdir -p "$FRAMEWORKS_DIR"

          copy_universal_dylib() {
            name="$1"
            dest="$FRAMEWORKS_DIR/$name"
            universal_src=""
            arm64_src=""
            x86_64_src=""

            while IFS= read -r src; do
              archs="$(lipo -archs "$src" 2>/dev/null || true)"
              if echo "$archs" | grep -qw arm64 && echo "$archs" | grep -qw x86_64; then
                universal_src="$src"
                break
              fi
              if echo "$archs" | grep -qw arm64 && [ -z "$arm64_src" ]; then
                arm64_src="$src"
              fi
              if echo "$archs" | grep -qw x86_64 && [ -z "$x86_64_src" ]; then
                x86_64_src="$src"
              fi
            done <<EOF
          $(find src-tauri/target -name "$name" -type f ! -path '*.dSYM/*' | sort)
          EOF

            if [ -n "$universal_src" ]; then
              cp "$universal_src" "$dest"
            elif [ -n "$arm64_src" ] && [ -n "$x86_64_src" ]; then
              lipo -create "$arm64_src" "$x86_64_src" -output "$dest"
            else
              echo "Missing runtime dylib: $name"
              echo "arm64 source: ${arm64_src:-<none>}"
              echo "x86_64 source: ${x86_64_src:-<none>}"
              exit 1
            fi
            chmod 755 "$dest"
            lipo -archs "$dest"
          }

          copy_universal_dylib libonnxruntime.1.17.1.dylib
          copy_universal_dylib libsherpa-onnx-c-api.dylib

          install_name_tool -add_rpath "@executable_path/../Frameworks" "$APP_PATH/Contents/MacOS/typex" 2>/dev/null || true
          install_name_tool -add_rpath "@executable_path/../Frameworks" "$FRAMEWORKS_DIR/libsherpa-onnx-c-api.dylib" 2>/dev/null || true
          codesign --force --deep --sign - "$APP_PATH"

          otool -L "$APP_PATH/Contents/MacOS/typex"
          test -f "$FRAMEWORKS_DIR/libonnxruntime.1.17.1.dylib"
          test -f "$FRAMEWORKS_DIR/libsherpa-onnx-c-api.dylib"

      - name: Prepare nightly assets
        run: |
          mkdir -p nightly-assets

          APP_PATH="$(find src-tauri/target -path '*/bundle/macos/Typex.app' -type d | sort | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No Typex.app found under src-tauri/target"
            find src-tauri/target -path '*/bundle/*' -type d | sort
            exit 1
          fi

          rm -rf dmg-root
          mkdir -p dmg-root
          ditto "$APP_PATH" dmg-root/Typex.app
          ln -s /Applications dmg-root/Applications
          hdiutil create \
            -volname Typex \
            -srcfolder dmg-root \
            -ov \
            -format UDZO \
            nightly-assets/Typex-nightly-macos-universal.dmg

          shasum -a 256 nightly-assets/Typex-nightly-macos-universal.dmg > nightly-assets/SHA256SUMS.txt

          BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          cat > nightly-assets/nightly.json <<EOF
          {
            "tag": "nightly",
            "commit": "${GITHUB_SHA}",
            "branch": "${GITHUB_REF_NAME}",
            "workflow_run": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}",
            "built_at": "${BUILD_TIME}",
            "platforms": ["macos-universal"],
            "assets": ["Typex-nightly-macos-universal.dmg", "SHA256SUMS.txt", "nightly.json"]
          }
          EOF

          cat > nightly-notes.md <<EOF
          Typex nightly build.

          - Commit: \`${GITHUB_SHA}\`
          - Branch: \`${GITHUB_REF_NAME}\`
          - Built at: \`${BUILD_TIME}\`
          - Platform: macOS universal DMG only
          - Signing: ad-hoc signed, not Apple-notarized

          This release is updated automatically on every push to the main development branch.
          EOF

      - name: Publish nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f nightly "$GITHUB_SHA"
          git push origin refs/tags/nightly --force

          if gh release view nightly >/dev/null 2>&1; then
            gh release edit nightly \
              --title "Typex Nightly" \
              --notes-file nightly-notes.md
          else
            gh release create nightly \
              --title "Typex Nightly" \
              --latest=false \
              --verify-tag \
              --notes-file nightly-notes.md
          fi

          RELEASE_ID="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/nightly" --jq '.id')"
          gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
            -F prerelease=false \
            -f make_latest=false

          gh release upload nightly nightly-assets/* --clobber
