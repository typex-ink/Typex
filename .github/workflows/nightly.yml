name: Nightly

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Add build-windows/build-linux jobs next to this one as platform support lands.
  # Each platform job should upload a nightly-assets-<platform> artifact; publish
  # consumes those artifacts without caring which platform produced them.
  build-macos:
    name: Build macOS universal
    runs-on: macos-14
    env:
      PLATFORM_ID: macos-universal
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Generate IPC bindings
        run: pnpm gen:ipc

      - name: Build macOS app
        run: >
          pnpm tauri build
          --target universal-apple-darwin
          --bundles app
          --no-sign
          --ci
          --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Bundle local runtime dylibs
        run: scripts/bundle-macos-runtime-dylibs.sh

      - name: Prepare macOS nightly assets
        run: |
          ASSET_DIR="nightly-assets/${PLATFORM_ID}"
          mkdir -p "$ASSET_DIR"

          APP_PATH="$(find src-tauri/target -path '*/bundle/macos/Typex.app' -type d | sort | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No Typex.app found under src-tauri/target"
            find src-tauri/target -path '*/bundle/*' -type d | sort
            exit 1
          fi

          rm -rf dmg-root
          mkdir -p dmg-root
          ditto "$APP_PATH" dmg-root/Typex.app
          ln -s /Applications dmg-root/Applications
          DMG_NAME="typex-${PLATFORM_ID}-nightly.dmg"
          hdiutil create \
            -volname Typex \
            -srcfolder dmg-root \
            -ov \
            -format UDZO \
            "$ASSET_DIR/$DMG_NAME"

          cat > "$ASSET_DIR/${PLATFORM_ID}.json" <<EOF
          {
            "platform": "${PLATFORM_ID}",
            "assets": ["${DMG_NAME}"]
          }
          EOF

      - name: Upload macOS nightly assets
        uses: actions/upload-artifact@v4
        with:
          name: nightly-assets-${{ env.PLATFORM_ID }}
          path: nightly-assets/${{ env.PLATFORM_ID }}/*
          if-no-files-found: error

  publish:
    name: Publish nightly release
    needs:
      - build-macos
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      - name: Download platform nightly assets
        uses: actions/download-artifact@v4
        with:
          pattern: nightly-assets-*
          path: nightly-assets
          merge-multiple: true

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Prepare aggregate nightly metadata
        run: |
          export BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          cd nightly-assets
          : > SHA256SUMS.txt
          while IFS= read -r -d '' file; do
            sha256sum "$file" >> SHA256SUMS.txt
          done < <(find . -maxdepth 1 -type f ! -name '*.json' ! -name 'SHA256SUMS.txt' -print0 | sort -z)
          cd ..

          node <<'NODE'
          const fs = require("fs");
          const dir = "nightly-assets";
          const files = fs.readdirSync(dir).filter((file) => fs.statSync(`${dir}/${file}`).isFile());
          const platformFiles = files.filter((file) => file.endsWith(".json") && file !== "nightly.json").sort();
          const platformAssets = platformFiles.map((file) => JSON.parse(fs.readFileSync(`${dir}/${file}`, "utf8")));
          const assetFiles = files
            .filter((file) => !platformFiles.includes(file) && file !== "nightly.json")
            .sort();
          const metadata = {
            tag: "nightly",
            commit: process.env.GITHUB_SHA,
            branch: process.env.GITHUB_REF_NAME,
            workflow_run: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            built_at: process.env.BUILD_TIME,
            platforms: platformAssets.map((item) => item.platform),
            assets: [...assetFiles, "nightly.json"],
            platform_assets: platformAssets,
          };
          fs.writeFileSync(`${dir}/nightly.json`, `${JSON.stringify(metadata, null, 2)}\n`);
          NODE

          find nightly-assets -maxdepth 1 -type f -name '*.json' ! -name 'nightly.json' -delete

          PLATFORMS="$(node -e "const fs = require('fs'); const m = JSON.parse(fs.readFileSync('nightly-assets/nightly.json', 'utf8')); console.log(m.platforms.join(', '));")"
          cat > nightly-notes.md <<EOF
          This release is updated automatically on every push to the main development branch.

          - Commit: \`${GITHUB_SHA}\`
          - Branch: \`${GITHUB_REF_NAME}\`
          - Built at: \`${BUILD_TIME}\`
          - Platforms: ${PLATFORMS}
          EOF

      - name: Publish nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f nightly "$GITHUB_SHA"
          git push origin refs/tags/nightly --force

          if gh release view nightly >/dev/null 2>&1; then
            gh release edit nightly \
              --title "Nightly Build" \
              --notes-file nightly-notes.md
          else
            gh release create nightly \
              --title "Nightly Build" \
              --latest=false \
              --verify-tag \
              --notes-file nightly-notes.md
          fi

          RELEASE_ID="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/nightly" --jq '.id')"
          gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
            -F prerelease=false \
            -f make_latest=false

          gh release upload nightly nightly-assets/* --clobber
