<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Typex UI Mockup · 全界面 · 纯墨 Monochrome</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html { font-size:13px; }
  body { font-family: Inter, "SF Pro Text", "Segoe UI Variable", system-ui, "PingFang SC", sans-serif; background:#CFCFCD; padding:32px; }
  .page-head { max-width:1560px; margin:0 auto 24px; }
  .page-head h1 { font-size:22px; }
  .page-head p { font-size:13px; color:#444; margin-top:4px; line-height:1.7; max-width:960px; }

  /* ============ 主题容器 ============ */
  .theme { max-width:1560px; margin:0 auto 40px; border-radius:18px; padding:32px; background:var(--bg); color:var(--text-1); border:1px solid rgba(0,0,0,.10); }
  .theme a { color:inherit; text-decoration:underline; text-underline-offset:3px; text-decoration-color:var(--text-3); }
  .theme > h2 { font-size:16px; color:var(--text-2); margin-bottom:24px; font-weight:600; }
  .light {
    --bg:#F8F8F7; --surface:#FFFFFF; --surface-2:#EFEFEE;
    --border:rgba(23,23,25,.10); --border-2:rgba(23,23,25,.18);
    --text-1:#171719; --text-2:#5C5C62; --text-3:#8E8E94;
    --primary:#171719; --primary-hover:#2E2E33; --on-primary:#FFFFFF;
    --sel-bg:#E4E4E2;
    --voice:#171719;
    --recording:#D6453D; --recording-soft:#FBEAE9;
    --success:#3B3B40; --warning:#5C5C62; --error:#C93B34;
    --focus-ring:rgba(23,23,25,.40);
    --shadow:0 8px 24px rgba(23,23,25,.10);
    --icon-bg:#000000; --icon-fg:#FFFFFF; --logo:#000000;
  }
  .dark {
    --bg:#111113; --surface:#19191C; --surface-2:#232327;
    --border:rgba(242,242,244,.10); --border-2:rgba(242,242,244,.20);
    --text-1:#F2F2F4; --text-2:#A2A2AA; --text-3:#68686F;
    --primary:#F2F2F4; --primary-hover:#FFFFFF; --on-primary:#111113;
    --sel-bg:rgba(242,242,244,.13);
    --voice:#F2F2F4;
    --recording:#F2555A; --recording-soft:rgba(242,85,90,.14);
    --success:#C9C9CF; --warning:#A2A2AA; --error:#F26D6D;
    --focus-ring:rgba(242,242,244,.45);
    --shadow:0 8px 24px rgba(0,0,0,.50);
    --icon-bg:#FFFFFF; --icon-fg:#000000; --logo:#FFFFFF;
  }

  .sec { margin-bottom:36px; }
  .sec > h3 { font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--text-3); margin-bottom:14px; padding-bottom:6px; border-bottom:1px solid var(--border); }
  .row { display:flex; gap:18px; flex-wrap:wrap; align-items:flex-start; }
  .lbl { font-size:10.5px; color:var(--text-3); margin-top:6px; }

  /* ============ 基础组件 ============ */
  .btn { display:inline-flex; align-items:center; gap:6px; height:32px; padding:0 14px; border-radius:8px; font-size:13px; font-weight:500; border:none; cursor:pointer; }
  .btn-primary { background:var(--primary); color:var(--on-primary); }
  .btn-secondary { background:transparent; color:var(--text-1); border:1px solid var(--border-2); }
  .btn-ghost { background:transparent; color:var(--text-2); text-decoration:underline; text-underline-offset:3px; }
  .btn-danger { background:transparent; color:var(--error); border:1px solid currentColor; }
  .btn-danger:hover { background:var(--recording-soft); }
  .btn-sm { height:26px; font-size:12px; padding:0 10px; }
  .btn-focus { outline:2px solid var(--focus-ring); outline-offset:2px; }
  .btn[disabled] { opacity:.45; cursor:default; }
  .input { height:32px; border-radius:8px; border:1px solid var(--border); background:var(--surface-2); color:var(--text-1); padding:0 10px; font-size:13px; width:100%; }
  .input::placeholder { color:var(--text-3); }
  .input:focus { outline:2px solid var(--focus-ring); outline-offset:1px; }
  .secret { display:flex; gap:0; align-items:center; border:1px solid var(--border); background:var(--surface-2); border-radius:8px; height:32px; padding-right:4px; }
  .secret input { flex:1; border:none; background:transparent; color:var(--text-1); padding:0 10px; font-family:monospace; font-size:12px; outline:none; min-width:0; }
  .secret button { border:none; background:transparent; color:var(--text-3); font-size:12px; padding:4px 6px; cursor:pointer; }
  .select { display:inline-flex; align-items:center; justify-content:space-between; gap:12px; height:32px; padding:0 10px; border-radius:8px; border:1px solid var(--border); background:var(--surface-2); font-size:13px; min-width:150px; }
  .select .arr { color:var(--text-3); font-size:10px; }
  .toggle { display:inline-block; width:36px; height:20px; border-radius:99px; background:var(--border-2); position:relative; vertical-align:middle; }
  .toggle::after { content:""; position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:50%; background:var(--surface); }
  .toggle.on { background:var(--primary); }
  .toggle.on::after { left:18px; background:var(--on-primary); }
  .kbd { font-family:monospace; font-size:11px; border:1px solid var(--border); border-bottom-width:2px; border-radius:5px; padding:2px 7px; background:var(--surface-2); white-space:nowrap; }
  .tag { display:inline-block; padding:3px 10px; border-radius:99px; font-size:11px; background:var(--sel-bg); color:var(--text-1); font-weight:600; }
  .tag-plain { background:var(--surface-2); color:var(--text-2); font-weight:400; border:1px solid var(--border); }
  .tag-rec { background:var(--recording-soft); color:var(--recording); font-weight:600; }
  .callout { display:flex; gap:8px; align-items:flex-start; border:1px solid var(--border); border-left:3px solid var(--text-2); background:var(--surface-2); border-radius:8px; padding:10px 12px; font-size:12px; color:var(--text-2); }
  .callout.err { border-left-color:var(--error); color:var(--error); }
  .slider { width:120px; height:4px; border-radius:2px; background:var(--border-2); position:relative; display:inline-block; vertical-align:middle; }
  .slider::after { content:""; position:absolute; left:60%; top:-5px; width:14px; height:14px; border-radius:50%; background:var(--primary); }
  .ta { border:1px solid var(--border); background:var(--surface-2); border-radius:8px; padding:9px 11px; font-family:monospace; font-size:11px; line-height:1.7; color:var(--text-2); white-space:pre-wrap; }
  .ta .ph { color:var(--text-1); font-weight:600; }

  /* ============ 窗口容器 ============ */
  .win { background:var(--surface); border:1px solid var(--border); border-radius:12px; box-shadow:var(--shadow); overflow:hidden; }
  .win-tb { display:flex; align-items:center; gap:6px; height:34px; padding:0 12px; border-bottom:1px solid var(--border); background:var(--surface-2); }
  .win-tb i { width:10px; height:10px; border-radius:50%; background:var(--border-2); display:block; }
  .win-tb span { font-size:11.5px; color:var(--text-2); margin-left:8px; }

  /* ============ HUD ============ */
  .hud { display:inline-flex; align-items:center; gap:9px; background:var(--surface); border:1px solid var(--border); border-radius:999px; padding:8px 16px 8px 13px; box-shadow:var(--shadow); font-size:12.5px; height:44px; }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--recording); animation:pulse 1.2s infinite; flex-shrink:0; }
  @keyframes pulse { 50% { opacity:.35; } }
  .bars { display:flex; align-items:center; gap:3px; height:18px; }
  .bars i { width:3.5px; border-radius:2px; background:var(--voice); display:block; }
  .b1{height:6px}.b2{height:11px}.b3{height:17px}.b4{height:11px}.b5{height:6px}
  .anim .b1{animation:eq .9s ease-in-out infinite}
  .anim .b2{animation:eq .9s .15s ease-in-out infinite}
  .anim .b3{animation:eq .9s .3s ease-in-out infinite}
  .anim .b4{animation:eq .9s .45s ease-in-out infinite}
  .anim .b5{animation:eq .9s .6s ease-in-out infinite}
  @keyframes eq { 50% { transform:scaleY(.4); } }
  .hud .x { color:var(--text-3); margin-left:2px; cursor:pointer; }
  .hud .mode { font-size:10.5px; border:1px solid var(--border-2); border-radius:99px; padding:1px 8px; color:var(--text-2); white-space:nowrap; }
  .hud .hint { color:var(--text-3); font-size:11.5px; }

  /* ============ 托盘菜单 ============ */
  .menu { width:230px; background:var(--surface); border:1px solid var(--border); border-radius:10px; box-shadow:var(--shadow); padding:5px; font-size:12.5px; }
  .menu .st { padding:6px 10px; color:var(--text-2); font-size:12px; }
  .menu hr { border:none; border-top:1px solid var(--border); margin:4px 6px; }
  .menu .it { display:flex; justify-content:space-between; align-items:center; padding:6px 10px; border-radius:6px; }
  .menu .it.hov { background:var(--sel-bg); }
  .menu .it .sc { color:var(--text-3); font-size:11px; }
  .menu .it .sub { color:var(--text-3); }

  /* ============ 回答弹窗 ============ */
  .panel-a { width:560px; background:var(--surface); border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow); overflow:hidden; }
  .panel-a .ask-row { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; padding:12px 14px 0; font-size:12.5px; color:var(--text-2); }
  .panel-a .ask-row .ask { line-height:1.5; }
  .panel-a .ask-row .x { color:var(--text-3); cursor:pointer; flex-shrink:0; }
  .panel-a .chip-row { display:flex; align-items:center; padding:8px 14px 0; }
  .chip { display:inline-flex; gap:6px; align-items:center; font-size:11.5px; color:var(--text-2); background:var(--surface-2); border:1px solid var(--border); border-radius:99px; padding:3px 10px; }
  .panel-a .ans { padding:14px; font-size:13px; line-height:1.6; }
  .panel-a .ans .bubble { border:1px solid var(--border); border-radius:10px; padding:10px 12px; }
  .panel-a .ans code { display:block; font-family:monospace; font-size:11.5px; background:var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:8px 10px; margin-top:8px; color:var(--text-2); }

  /* ============ 设置窗口 ============ */
  .settings { width:720px; }
  .set-body { display:flex; min-height:420px; }
  .nav { width:160px; flex-shrink:0; background:var(--surface-2); padding:10px 8px; font-size:12.5px; }
  .nav div { padding:7px 12px; border-radius:8px; color:var(--text-2); margin-bottom:2px; }
  .nav .on { background:var(--sel-bg); color:var(--text-1); font-weight:600; }
  .content { flex:1; padding:18px 20px; }
  .content h5 { font-size:15px; margin-bottom:14px; }
  .content .desc { font-size:12px; color:var(--text-2); margin:-10px 0 16px; }
  .slot-h { font-size:11px; color:var(--text-3); letter-spacing:.06em; margin:16px 0 8px; display:flex; justify-content:space-between; align-items:center; }
  .prov { border:1px solid var(--border); border-radius:10px; padding:11px 13px; font-size:12.5px; margin-bottom:8px; display:flex; align-items:center; gap:10px; }
  .prov.on { background:var(--sel-bg); border-color:var(--border-2); }
  .prov .logo { width:26px; height:26px; border-radius:6px; background:var(--surface-2); border:1px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:10px; color:var(--text-3); }
  .prov .meta { flex:1; line-height:1.45; }
  .prov .meta small { color:var(--text-3); font-size:11px; }
  .prov .lat { font-size:11px; color:var(--text-2); border:1px solid var(--border-2); padding:2px 8px; border-radius:99px; font-family:monospace; }
  .pbar { height:4px; border-radius:2px; background:var(--surface-2); overflow:hidden; }
  .pbar i { display:block; height:100%; border-radius:2px; background:var(--text-1); }
  .frow { display:flex; align-items:center; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--border); font-size:12.5px; gap:16px; }
  .frow:last-child { border-bottom:none; }
  .frow .l { color:var(--text-1); }
  .frow .l small { display:block; color:var(--text-3); font-size:11px; margin-top:2px; }
  .diag { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); font-size:12.5px; }
  .diag .ok { color:var(--success); } .diag .bad { color:var(--error); }
  .diag .fix { margin-left:auto; }

  /* ============ 引导 ============ */
  .onb { width:640px; min-height:430px; display:flex; flex-direction:column; }
  .onb .body { flex:1; padding:28px 32px; display:flex; flex-direction:column; }
  .steps { display:flex; gap:6px; justify-content:center; padding:14px 0 0; }
  .steps i { width:6px; height:6px; border-radius:50%; background:var(--border-2); display:block; }
  .steps i.on { background:var(--primary); }
  .onb .foot { display:flex; justify-content:space-between; align-items:center; padding:14px 32px 18px; }
  .perm { display:flex; align-items:center; gap:12px; border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:8px; font-size:12.5px; }
  .perm .s { margin-left:auto; }

  /* ============ 主页(主窗口) ============ */
  .mwin { width:880px; }
  .mbody { display:flex; min-height:520px; }
  .mside { width:180px; flex-shrink:0; background:var(--surface-2); display:flex; flex-direction:column; padding:16px 10px 12px; }
  .mside .brand { display:flex; align-items:center; gap:8px; padding:0 10px 16px; }
  .mside .brand .mini { width:26px; height:26px; border-radius:7px; background:var(--icon-bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.5px; }
  .mside .brand .mini .g { display:flex; gap:1.5px; align-items:center; }
  .mside .brand .mini .g i { width:2px; border-radius:1px; background:var(--icon-fg); display:block; }
  .mside .brand .mini .g .m1 { height:4px; } .mside .brand .mini .g .m2 { height:7px; } .mside .brand .mini .g .m3 { height:10px; }
  .mside .brand .mini .g .m4 { height:7px; } .mside .brand .mini .g .m5 { height:4px; }
  .mside .brand .mini .s { width:2px; height:7px; background:var(--icon-fg); border-radius:1px; }
  .mside .brand b { font-size:15px; letter-spacing:-.01em; }
  .mside nav div { display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:8px; color:var(--text-2); font-size:13px; margin-bottom:2px; }
  .mside nav .on { background:var(--sel-bg); color:var(--text-1); font-weight:600; }
  .mside .mfoot { margin-top:auto; display:flex; gap:4px; padding:0 6px; }
  .mside .mfoot span { width:28px; height:28px; border-radius:7px; display:flex; align-items:center; justify-content:center; color:var(--text-3); font-size:13px; }
  .mmain { flex:1; padding:26px 28px 16px; display:flex; flex-direction:column; }
  .mhero h4 { font-size:21px; letter-spacing:-.01em; margin-bottom:8px; }
  .mhero p { font-size:13px; color:var(--text-2); }
  .mstats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:22px 0; }
  .mstat { border:1px solid var(--border); border-radius:12px; padding:16px 16px 13px; }
  .mstat b { display:block; font-size:24px; font-weight:600; letter-spacing:-.02em; }
  .mstat b small { font-size:13px; font-weight:500; color:var(--text-2); margin-left:2px; }
  .mstat span { font-size:11.5px; color:var(--text-3); }
  .msec-h { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:8px; }
  .msec-h h6 { font-size:13px; font-weight:600; }
  .msec-h a { font-size:12px; color:var(--text-2); text-decoration:underline; text-underline-offset:3px; }
  .mrecent { border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .mrecent .hrow:last-child { border-bottom:none; }

  /* ============ 历史(主窗口页签) ============ */
  .hist { width:640px; }
  .hist .top { display:flex; gap:10px; padding:12px 14px; border-bottom:1px solid var(--border); align-items:center; }
  .hist .note { font-size:11px; color:var(--text-3); padding:6px 14px; border-bottom:1px solid var(--border); }
  .hrow { padding:10px 14px; border-bottom:1px solid var(--border); font-size:12.5px; display:flex; gap:10px; align-items:baseline; }
  .hrow time { color:var(--text-3); font-size:11px; white-space:nowrap; }
  .hrow .app { color:var(--text-3); font-size:11px; }
  .hrow .sum { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .hexp { background:var(--surface-2); border-bottom:1px solid var(--border); padding:12px 14px; }
  .hexp .cols { display:flex; gap:12px; font-size:12px; line-height:1.6; }
  .hexp .cols > div { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:8px 10px; }
  .hexp .cols small { display:block; color:var(--text-3); font-size:10.5px; margin-bottom:4px; }

  /* ============ 图标 & 色板 ============ */
  .appicon { width:88px; height:88px; border-radius:24px; background:var(--icon-bg); display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:var(--shadow); }
  .appicon .bars { gap:5px; height:34px; }
  .appicon .bars i { width:7px; border-radius:4px; background:var(--icon-fg); }
  .appicon .ib1{height:14px}.appicon .ib2{height:24px}.appicon .ib3{height:34px}.appicon .ib4{height:24px}.appicon .ib5{height:14px}
  .appicon .stem { width:7px; height:24px; margin-top:5px; background:var(--icon-fg); border-radius:4px; }
  .logotype { font-size:26px; font-weight:600; letter-spacing:-0.01em; color:var(--logo); }
  .sw { border-radius:10px; overflow:hidden; border:1px solid var(--border); background:var(--surface); width:104px; }
  .sw .cchip { height:44px; }
  .sw .meta { padding:6px 8px; font-size:10px; line-height:1.5; }
  .sw .meta b { display:block; font-size:10.5px; }
  .sw .meta span { color:var(--text-3); font-family:monospace; }
  .empty { text-align:center; padding:28px; color:var(--text-3); font-size:12.5px; border:1px dashed var(--border-2); border-radius:12px; width:280px; }
  .empty .glyph { font-size:22px; margin-bottom:6px; }
</style>
</head>
<body>
<div class="page-head">
  <h1>Typex UI Mockup · 全界面 · 纯墨 Monochrome</h1>
  <p>本页是 <b>docs/04-design-system.md</b>(token)与 <b>docs/05-ux-spec.md</b>(界面规格)的可视化定稿,覆盖软件全部界面 × 亮/暗双主题。
  实现任何界面前先在此找到对应 mock。规则速记:全部颜色引用 token;界面只有黑白灰,唯一彩色是录音红/错误红;选中态 = 灰底 + 字重,禁止反色实底;链接用下划线;每页只有主按钮一处实底反色。</p>
</div>

<div class="theme light" id="t-light"></div>
<div class="theme dark" id="t-dark"></div>

<template id="all-ui">
  <h2 class="theme-name"></h2>

  <!-- ═══════ 1. 主页(主窗口) ═══════ -->
  <div class="sec">
    <h3>1 · 主页(主窗口 880×560,侧边栏导航;从托盘/Dock 打开,不常驻)</h3>
    <div class="row">
      <div>
        <div class="win mwin">
          <div class="win-tb"><i></i><i></i><i></i></div>
          <div class="mbody">
            <div class="mside">
              <div class="brand"><span class="mini"><span class="g"><i class="m1"></i><i class="m2"></i><i class="m3"></i><i class="m4"></i><i class="m5"></i></span><span class="s"></span></span><b>Typex</b></div>
              <nav>
                <div class="on">⌂ 首页</div>
                <div>◷ 历史记录</div>
              </nav>
              <div class="mfoot"><span title="设置">⚙</span><span title="切换深浅色">◐</span></div>
            </div>
            <div class="mmain">
              <div class="mhero">
                <h4>说,即所得。</h4>
                <p>按住 <span class="kbd">右 ⌘</span> 开始语音输入 · <span class="kbd">右 ⌥</span> 向助手说指令</p>
              </div>
              <div class="mstats">
                <div class="mstat"><b>2<small>时</small>33<small>分</small></b><span>总口述时长</span></div>
                <div class="mstat"><b>17,542<small>字</small></b><span>口述字数</span></div>
                <div class="mstat"><b>8<small>时</small>24<small>分</small></b><span>节省时间</span></div>
                <div class="mstat"><b>172<small>字/分</small></b><span>平均语速</span></div>
              </div>
              <div class="msec-h"><h6>最近</h6><a href="#">查看全部历史 →</a></div>
              <div class="mrecent">
                <div class="hrow"><time>14:32</time><span class="tag tag-plain">听写</span><span class="app">微信</span><span class="sum">今晚的会改到八点半,你们先吃饭不用等我</span></div>
                <div class="hrow"><time>11:07</time><span class="tag tag-plain">中→EN</span><span class="app">Slack</span><span class="sum">I'll fix this bug tomorrow morning; for today…</span></div>
                <div class="hrow"><time>昨天</time><span class="tag tag-plain">助手</span><span class="app">VS Code</span><span class="sum">这个错误一般是什么原因?</span></div>
              </div>
            </div>

<script>
const tokens = [
  ["--bg","窗口底色"],["--surface","卡片/HUD"],["--surface-2","输入框/inset"],
  ["--text-1","主文本/主色"],["--text-2","次文本"],["--text-3","占位/禁用"],
  ["--sel-bg","选中背景"],["--recording","录音红(唯一彩色)"],["--error","错误红"],
];
const meta = {
  "t-light": { name:"Light · 纸面", icon:"浅色模式:黑底 #000 + 白 glyph" },
  "t-dark":  { name:"Dark · 墨面",  icon:"深色模式:白底 #FFF + 黑 glyph" },
};
for (const id of ["t-light","t-dark"]) {
  const root = document.getElementById(id);
  root.appendChild(document.getElementById("all-ui").content.cloneNode(true));
  root.querySelector(".theme-name").textContent = meta[id].name;
  root.querySelector(".icon-lbl").textContent = meta[id].icon;
  const area = root.querySelector(".sw-area");
  const cs = getComputedStyle(root);
  for (const [tok,label] of tokens) {
    const v = cs.getPropertyValue(tok).trim();
    const d = document.createElement("div");
    d.className = "sw";
    d.innerHTML = `<div class="cchip" style="background:${v}"></div><div class="meta"><b>${label}</b><span>${tok}<br>${v}</span></div>`;
    area.appendChild(d);
  }
}
</script>
